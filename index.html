function ddToDMS(dd, isLat){
  const dir = dd>=0 ? (isLat?'N':'E') : (isLat?'S':'W');
  const abs=Math.abs(dd); const d=Math.floor(abs); const mf=(abs-d)*60; const m=Math.floor(mf); const s=((mf-m)*60);
  return `${d}°${String(m).padStart(2,'0')}'${s.toFixed(1)}"${dir}`;
}
// crude deterministic "bearing" for flavor when we only have a point (no track)
function flavorBearing(lat, lon){
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const idx=Math.abs(Math.round((lat+lon)*10))%16;
  return {label:dirs[idx], deg:idx*22.5};
}

/* ============================================================

function refreshTackleBox(){
  // Call the live, fully-chained render() — this is effectively what a page reload does,
  // and the user confirmed a reload shows the loadout. render is a reassigned global, so at
  // call time (long after load) it points to the final wrapped version.
  try{ if(typeof render==='function'){ render(); return; } }catch(e){}
  try{ if(document.getElementById('tackle')&&typeof renderTackle==='function')renderTackle(); }catch(e){}
}
const MAX_LOADOUTS=5;

function loadoutIcon(l){ const cat=String(l.category||'').toLowerCase();
  if(cat.includes('top')||cat.includes('popper')||cat.includes('walk')||cat.includes('buzz'))return '🌊';
  if(cat.includes('jig')||cat.includes('ned')||cat.includes('tube')||cat.includes('drop')||cat.includes('soft'))return '🪱';
  if(cat.includes('crank')||cat.includes('jerk')||cat.includes('lipless')||cat.includes('square'))return '🎣';
  if(cat.includes('spinner')||cat.includes('chatter')||cat.includes('blade')||cat.includes('spoon'))return '✨';

}

/* PHOTO ENGINE INJECTED */
/* ============================================================
   FishSlayR v1.1 — Photo Engine
   Hybrid storage: full-res Blob in IndexedDB + base64 thumbnail
   on the catch object. EXIF timestamp + best-effort GPS. Live
   geolocation fallback. Works on iOS Safari + Android Chrome.
   Self-contained, no external libraries.
   ============================================================ */
const PHOTO_DB='fishslayr_photos', PHOTO_STORE='catchPhotos', PHOTO_DB_VER=1;
let _photoDbPromise=null;
function photoDB(){
  if(_photoDbPromise)return _photoDbPromise;
  _photoDbPromise=new Promise((res,rej)=>{
    if(!('indexedDB' in window)){rej(new Error('no-indexeddb'));return}
    const req=indexedDB.open(PHOTO_DB,PHOTO_DB_VER);
    req.onupgradeneeded=e=>{const db=e.target.result; if(!db.objectStoreNames.contains(PHOTO_STORE))db.createObjectStore(PHOTO_STORE);};
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error||new Error('idb-open-failed'));
  });
  return _photoDbPromise;
}
async function photoPut(catchId, blob){
  try{const db=await photoDB();return await new Promise((res,rej)=>{const tx=db.transaction(PHOTO_STORE,'readwrite');tx.objectStore(PHOTO_STORE).put(blob,catchId);tx.oncomplete=()=>res(true);tx.onerror=()=>rej(tx.error);});}
  catch(e){console.warn('photoPut failed',e);return false}
}
async function photoGet(catchId){
  try{const db=await photoDB();return await new Promise((res,rej)=>{const tx=db.transaction(PHOTO_STORE,'readonly');const r=tx.objectStore(PHOTO_STORE).get(catchId);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});}
  catch(e){console.warn('photoGet failed',e);return null}
}
async function photoClearAll(){try{const db=await photoDB();return await new Promise(res=>{const tx=db.transaction(PHOTO_STORE,'readwrite');tx.objectStore(PHOTO_STORE).clear();tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}catch(e){return false}}
async function photoDelete(catchId){
  try{const db=await photoDB();return await new Promise((res)=>{const tx=db.transaction(PHOTO_STORE,'readwrite');tx.objectStore(PHOTO_STORE).delete(catchId);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}
  catch(e){return false}
}

/* ---- image downscale to thumbnail (base64) + display-res blob ---- */
function loadImageFromFile(file){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{res({img,url})};
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('image-decode-failed'))};
    img.src=url;
  });
}
function drawScaled(img, maxDim, quality, type='image/jpeg'){
  let {naturalWidth:w, naturalHeight:h}=img;
  const scale=Math.min(1, maxDim/Math.max(w,h));
  w=Math.round(w*scale); h=Math.round(h*scale);
  const cvs=document.createElement('canvas'); cvs.width=w; cvs.height=h;
  const ctx=cvs.getContext('2d'); ctx.drawImage(img,0,0,w,h);
  return cvs;
}
function canvasToBlob(cvs, type, quality){
  return new Promise(res=>{ if(cvs.toBlob)cvs.toBlob(b=>res(b),type,quality); else res(dataURLtoBlob(cvs.toDataURL(type,quality))); });
}
function dataURLtoBlob(dataURL){
  const [head,body]=dataURL.split(','); const mime=(head.match(/:(.*?);/)||[])[1]||'image/jpeg';
  const bin=atob(body); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

/* ---- minimal EXIF reader: DateTimeOriginal (0x9003) + GPS ---- */
function readExif(file){
  return new Promise((resolve)=>{
    const slice=file.slice(0, 256*1024); // EXIF lives in first bytes; 256KB is plenty
    const r=new FileReader();
    r.onload=()=>{ try{resolve(parseExif(new DataView(r.result)));}catch(e){resolve({});} };
    r.onerror=()=>resolve({});
    r.readAsArrayBuffer(slice);
  });
}
function parseExif(view){
  const out={};
  if(view.byteLength<4 || view.getUint16(0)!==0xFFD8) return out; // not JPEG
  let offset=2;
  while(offset<view.byteLength){
    if(view.getUint16(offset)===0xFFE1){ // APP1
      return parseApp1(view, offset+4)||out;
    }
    if((view.getUint16(offset)&0xFF00)!==0xFF00) break;
    offset+=2+view.getUint16(offset+2);
  }
  return out;
}
function parseApp1(view, start){
  const out={};
  // "Exif\0\0"
  if(view.getUint32(start)!==0x45786966) return out;
  const tiff=start+6;
  const little=view.getUint16(tiff)===0x4949;
  const g16=(o)=>view.getUint16(o,little), g32=(o)=>view.getUint32(o,little);
  if(view.getUint16(tiff+2,little)!==0x002A) return out;
  const ifd0=tiff+g32(tiff+4);
  let exifIFD=null, gpsIFD=null;
  const readDir=(dirStart)=>{
    const n=g16(dirStart); const entries=[];
    for(let i=0;i<n;i++){ const e=dirStart+2+i*12; entries.push({tag:g16(e),type:g16(e+2),count:g32(e+4),valOff:e+8}); }
    return entries;
  };
  const strVal=(e)=>{ let o=e.count>4?tiff+g32(e.valOff):e.valOff; let s=''; for(let i=0;i<e.count-1;i++)s+=String.fromCharCode(view.getUint8(o+i)); return s; };
  const ratVal=(o)=>{ const num=g32(o), den=g32(o+4); return den?num/den:0; };
  try{
    readDir(ifd0).forEach(e=>{ if(e.tag===0x8769)exifIFD=tiff+g32(e.valOff); if(e.tag===0x8825)gpsIFD=tiff+g32(e.valOff); });
    if(exifIFD){ readDir(exifIFD).forEach(e=>{ if(e.tag===0x9003||e.tag===0x9004){ const s=strVal(e); if(s&&!out.dateTime)out.dateTime=s; } }); }
    if(gpsIFD){
      let latRef='N',lonRef='E',lat=null,lon=null;
      readDir(gpsIFD).forEach(e=>{
        if(e.tag===0x0001)latRef=String.fromCharCode(view.getUint8(e.valOff));
        if(e.tag===0x0003)lonRef=String.fromCharCode(view.getUint8(e.valOff));
        if(e.tag===0x0002){const o=tiff+g32(e.valOff);lat=ratVal(o)+ratVal(o+8)/60+ratVal(o+16)/3600;}
        if(e.tag===0x0004){const o=tiff+g32(e.valOff);lon=ratVal(o)+ratVal(o+8)/60+ratVal(o+16)/3600;}
      });
      if(lat!=null&&lon!=null){ out.lat=(latRef==='S'?-1:1)*lat; out.lon=(lonRef==='W'?-1:1)*lon; }
    }
  }catch(e){}
  return out;
}
// EXIF datetime "YYYY:MM:DD HH:MM:SS" -> {date:'YYYY-MM-DD', time:'HH:MM'}
function exifDateTimeParts(dt){
  const m=String(dt||'').match(/^(\d{4}):(\d{2}):(\d{2})\s+(\d{2}):(\d{2})/);
  if(!m)return null; return {date:`${m[1]}-${m[2]}-${m[3]}`, time:`${m[4]}:${m[5]}`};
}

/* ---- live geolocation (reliable fallback when EXIF GPS is stripped) ---- */
function getLiveLocation(timeoutMs=8000){
  return new Promise((res)=>{
    if(!('geolocation' in navigator)){res(null);return}
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy}),
      ()=>res(null),
      {enableHighAccuracy:true,timeout:timeoutMs,maximumAge:60000}
    );
  });
}

/* ---- the capture entrypoint, called from the details step ---- */
async function handleCatchPhoto(input){
  const file=input.files&&input.files[0];
  if(!file){return}
  const statusEl=document.getElementById('photoStatus');
  const setStatus=(t)=>{ if(statusEl)statusEl.textContent=t; };
  setStatus('Reading photo…');
  try{
    // 1) EXIF (timestamp + best-effort GPS) in parallel with image decode
    const [exif,loaded]=await Promise.all([readExif(file), loadImageFromFile(file)]);
    const {img,url}=loaded;

    // 2) build display-res blob (~1600px) and thumbnail (~640px)
    const dispCanvas=drawScaled(img,1600,0.82);
    const thumbCanvas=drawScaled(img,640,0.72);
    const dispBlob=await canvasToBlob(dispCanvas,'image/jpeg',0.82);
    const thumbBlob=await canvasToBlob(thumbCanvas,'image/jpeg',0.72);
    const thumbDataURL=await blobToDataURL(thumbBlob);
    URL.revokeObjectURL(url);

    // 3) stash on the draft; full-res written to IDB at landFish time (needs final id)
    catchDraft._photoDispBlob=dispBlob;
    catchDraft.photoThumb=thumbDataURL;
    catchDraft.photoMeta={w:img.naturalWidth,h:img.naturalHeight,ts:Date.now()};

    // 4) autofill from EXIF timestamp
    let filled=[];
    const parts=exifDateTimeParts(exif.dateTime);
    if(parts){
      catchDraft.time=parts.time; filled.push('time '+parts.time);
      const sess=activeSession();
      if(sess && sess.date && parts.date && sess.date!==parts.date){
        catchDraft._photoDateNote=`Photo dated ${parts.date} (trip is ${sess.date})`;
      }
    }
    // 5) location: EXIF GPS if present, else offer live location
    if(exif.lat!=null && exif.lon!=null){
      catchDraft.photoLat=exif.lat; catchDraft.photoLon=exif.lon; catchDraft.photoGeoSource='photo';
      filled.push('GPS from photo');
    }

    setStatus(`✓ Photo attached${filled.length?' — autofilled '+filled.join(', '):''}`);
    if(typeof FishAudio!=='undefined')FishAudio.play('button');
    renderCatchStep(!!catchDraft.id); // re-render details step so preview + autofilled fields show
  }catch(e){
    console.warn('photo capture failed',e);
    setStatus('Could not read that photo. You can still log the fish.');
  }
}
function blobToDataURL(blob){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(blob);}); }

async function useLivePhotoLocation(){
  const statusEl=document.getElementById('photoStatus');
  if(statusEl)statusEl.textContent='Getting your location…';
  const loc=await getLiveLocation();
  if(loc){ catchDraft.photoLat=loc.lat; catchDraft.photoLon=loc.lon; catchDraft.photoGeoSource='live'; if(statusEl)statusEl.textContent=`✓ Location captured (±${Math.round(loc.acc)}m)`; }
  else if(statusEl)statusEl.textContent='Location unavailable or denied.';
  renderCatchStep(!!catchDraft.id);
}
function removeCatchPhoto(){
  delete catchDraft._photoDispBlob; delete catchDraft.photoThumb; delete catchDraft.photoMeta;
  delete catchDraft.photoLat; delete catchDraft.photoLon; delete catchDraft.photoGeoSource; delete catchDraft._photoDateNote;
  catchDraft._photoRemoved=true; // signal landFish to delete any stored blob on edit
  renderCatchStep(!!catchDraft.id);
}

function discoveries(){const c=seasonCatches();if(!c.length)return ['Log a few fish and FishSlayR will start noticing what matters.'];const big=biggest(c)||{};const topLure=topValue(c,x=>x.lure), topColor=topValue(c,x=>x.color), topWater=topValue(c,x=>sessionFor(x.sessionId).water), topCrew=topValue(c,x=>(sessionFor(x.sessionId).partners||['Solo']).join(', '));const morning=c.filter(x=>parseInt((x.time||'12').split(':')[0])<12).length;const deep=c.filter(x=>String(x.depth||'').includes('20')||String(x.depth||'').includes('40')).length;let out=[];out.push(`Your confidence bait right now is <strong>${esc(topColor)} ${esc(topLure)}</strong>. It has produced more memories than anything else this season.`);out.push(`Your strongest water is <strong>${esc(topWater)}</strong>, with the largest remembered fish at <strong>${esc(big.length||0)} inches</strong>.`);if(topCrew&&topCrew!=='Solo')out.push(`The crew pattern is real: <strong>${esc(topCrew)}</strong> is attached to more fish than any other partner setup.`);if(morning>c.length*.45)out.push(`Morning is carrying the season. More than ${Math.round(morning/c.length*100)}% of your fish are coming before noon.`);if(deep>5)out.push(`Deep water is showing up. Dave's Canada-style jigging/trolling patterns are now visible in the data.`);return out;}

function trophyWall(){const c=seasonCatches(),big=biggest(c)||{};const species=bestBySpecies(c);const sessions=seasonSessions();const most=sessions.map(s=>[s,catchesForSession(s.id).length]).sort((a,b)=>b[1]-a[1])[0]||[];const unlockedSpecies=Object.keys(groupCount(c,x=>x.species)).length;const plaques=[['🏆','Legend Fish',`${big.length||0}"`,`${esc(big.species||'No fish yet')} • ${esc(sessionFor(big.sessionId).water||'')}`,!!big.id],['🐟','Species Collector',unlockedSpecies,`${unlockedSpecies} species remembered`,unlockedSpecies>=3],['🔥','Numbers Day',most[1]||0,`${esc(most[0]?.title||most[0]?.name||'No trip')} had the biggest livewell`,(most[1]||0)>=10],['🇨🇦','Canada Slam','Dave',`Walleye, Pike, Trout, Perch in one chapter`,c.some(x=>sessionFor(x.sessionId).water?.includes('Ontario'))],['🎯','Pattern Master',topValue(c,x=>x.lure),`Most trusted lure this season`,c.length>=5],['🌊','Water Explorer',Object.keys(groupCount(c,x=>sessionFor(x.sessionId).water)).length,`different waters fished`,c.length>=5]];return `<div class="legend-wall">${plaques.map(p=>`<div class="legend-plaque ${p[4]?'':'locked'}"><div class="medal">${p[0]}</div><h4>${p[1]}</h4><strong>${p[2]}</strong><small class="muted">${p[3]}</small></div>`).join('')}</div>`}

function suggestedSeasonId(){
  const y=new Date().getFullYear();
  let id=String(y);
  if(!data.seasons.some(s=>s.id===id))return id;
  let n=2; while(data.seasons.some(s=>s.id===id+'-'+n))n++;
  return id+'-'+n;
}
function seasonMoodName(){
  const m=new Date().getMonth()+1;
  if(m>=3&&m<=5)return 'Spring';
  if(m>=6&&m<=8)return 'Summer';
  if(m>=9&&m<=11)return 'Fall';
  return 'Winter';
}
function openStartSeasonSheet(){
  const id=suggestedSeasonId();
  const mood=seasonMoodName();
  document.getElementById('sheetTitle').textContent='Start a New Season';
  document.getElementById('sheetSub').textContent='A new chapter begins. Old seasons stay in Campfire and Intelligence.';
  document.getElementById('sheetBody').innerHTML=`<div class="details"><label>Season ID<input id="newSeasonId" value="${esc(id)}"></label><label>Season Name<input id="newSeasonName" value="${esc(mood+' '+String(new Date().getFullYear())+' — New Water')}"></label><label>Season Status<select id="newSeasonStatus"><option value="open">Open / Active</option><option value="archived">Archived</option></select></label><textarea id="newSeasonNotes">A new chapter begins.</textarea></div>`;
  document.getElementById('sheetActions').innerHTML=`<button class="btn" onclick="closeSheet()">Cancel</button><button class="btn primary" onclick="saveNewSeason()">Start Season</button>`;
  document.getElementById('sheet').classList.add('active');
}
function saveNewSeason(){
  const id=(val('newSeasonId')||suggestedSeasonId()).trim();
  if(!id){toast('Season needs an ID');return}
  if(data.seasons.some(s=>s.id===id)){toast('That season ID already exists');return}
  data.seasons.push({id,name:val('newSeasonName')||id,archived:val('newSeasonStatus')==='archived',notes:val('newSeasonNotes')||'',created:new Date().toISOString().slice(0,10)});
  data.activeSeason=id;
  data.sessions.forEach(s=>s.active=false);
  if(window.FishSync){FishSync.touch(data.seasons[data.seasons.length-1]);FishSync.touchProfile();FishSync.scheduleSync();}
  closeSheet();save();FishAudio.play('chapter');toast('🌅 A new season begins');
  setPage('boathouse');
}

function saveSeasonRename(id){
  const s=data.seasons.find(x=>x.id===id); if(!s)return;
  s.name=val('editSeasonName')||s.name||s.id;
  s.archived=val('editSeasonStatus')==='archived';
  s.notes=val('editSeasonNotes')||'';

function toggleArchiveSeason(id){
  const s=data.seasons.find(x=>x.id===id); if(!s){toast('No season selected');return}
  if(!s.archived){
    if(!confirm(`Archive "${s.name||s.id}"?\n\nTrips, catches, livewells, and stories stay available. New trips should usually go into a new open season.`))return;
    s.archived=true; s.archivedOn=new Date().toISOString().slice(0,10);
    data.sessions.forEach(x=>{if(x.season===s.id&&x.active){x.active=false;x.end=x.end||new Date().toTimeString().slice(0,5)}});
    toast('✓ Season archived. The river remembers.');
  }else{
    s.archived=false; delete s.archivedOn; toast('Season reopened');
  }
  if(window.FishSync){FishSync.touch(s);FishSync.scheduleSync();}
  save();

// Genesis II 1.1 — River Intelligence Revamp
function calendarSeasonFromDate(dateStr){
  const m=parseInt(String(dateStr||'').slice(5,7),10);
  if(!m)return 'Unknown Season';
  if([3,4,5].includes(m))return 'Spring';
  if([6,7,8].includes(m))return 'Summer';
  if([9,10,11].includes(m))return 'Fall';
  return 'Winter';
}
function waterTypeForSession(s){
  const explicit=s.waterType||s.water_type||s.type; if(explicit)return explicit;
  const w=String(s.water||'').toLowerCase();
  if(w.includes('creek')||w.includes('breeches')||w.includes('conodoguinet')||w.includes('swatara')||w.includes('shermans'))return 'Creek';
  if(w.includes('river')||w.includes('susquehanna')||w.includes('juniata')||w.includes('st. lawrence')||w.includes('french river'))return 'River';
  if(w.includes('reservoir'))return 'Reservoir';
  if(w.includes('pond'))return 'Pond';
  if(w.includes('lake')||w.includes('lac ')||w.includes('georgian bay')||w.includes('woods')||w.includes('simcoe')||w.includes('nipissing'))return 'Lake';
  return 'Other Water';
}
function timeWindowForCatch(x){
  const h=parseInt(String(x.time||'12').split(':')[0],10);
  if(h<6)return 'Pre-dawn';
  if(h<9)return 'Sunrise';
  if(h<12)return 'Morning';
  if(h<15)return 'Midday';
  if(h<18)return 'Afternoon';
  if(h<21)return 'Evening';
  return 'Night';
}
function tempBucket(v){
  const n=parseFloat(v);
  if(!isFinite(n))return 'Temp Not Logged';
  if(n<45)return 'Cold <45°';
  if(n<55)return 'Cool 45–54°';
  if(n<65)return 'Prime Cool 55–64°';
  if(n<75)return 'Prime Warm 65–74°';
  if(n<82)return 'Warm 75–81°';
  return 'Hot 82°+';
}
function intelRows(items,labelFn,valueFn,limit=6){
  const counts=groupCount(items,labelFn);
  const rows=topEntries(counts,limit);
  const max=Math.max(1,...rows.map(x=>x[1]));
  if(!rows.length)return '<p class="muted">No catches logged yet.</p>';
  return rows.map(([k,v])=>`<div class="pattern-row"><b>${esc(k)}</b><div><div class="pattern-track"><div class="pattern-fill" style="width:${Math.round(v/max*100)}%"></div></div>${valueFn?`<small>${valueFn(k,v)}</small>`:''}</div><span>${v}</span></div>`).join('');
}
function enrichedCatches(){return seasonCatches().map(c=>{const s=sessionFor(c.sessionId);return {...c,_session:s,_water:s.water,_weather:s.weather,_clarity:s.clarity,_flow:s.flow,_seasonPhase:s.spawnPhase||calendarSeasonFromDate(s.date),_waterType:waterTypeForSession(s),_timeWindow:timeWindowForCatch(c),_tempBucket:tempBucket(s.waterTemp),_month:monthLabel(s.date)}})}
function monthLabel(dateStr){
  const m=parseInt(String(dateStr||'').slice(5,7),10);
  return ['Unknown','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]||'Unknown';
}
function topCombo(catches){
  if(!catches.length)return null;
  const counts={};
  catches.forEach(c=>{
    const key=[c.species,c.color,c.lure,c._clarity,c._waterType,c._seasonPhase].map(x=>x||'Unknown').join('|||');
    counts[key]=(counts[key]||0)+1;
  });
  const best=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  if(!best)return null;
  const [species,color,lure,clarity,waterType,seasonPhase]=best[0].split('|||');
  return {species,color,lure,clarity,waterType,seasonPhase,count:best[1]};
}
function avgFor(items){return items.length?(items.reduce((a,x)=>a+(+x.length||0),0)/items.length).toFixed(1):'0.0'}
function bestGroup(items,fn){const top=topEntries(groupCount(items,fn),1)[0];return top?{label:top[0],count:top[1]}:{label:'Learning',count:0}}
function intelDiscoveryCards(c){
  if(!c.length)return '<p class="muted">Land a few fish and this board will start showing useful patterns.</p>';
  const bestLure=bestGroup(c,x=>x.lure);
  const bestColor=bestGroup(c,x=>x.color);
  const bestSeason=bestGroup(c,x=>x._seasonPhase);
  const bestWaterType=bestGroup(c,x=>x._waterType);
  const bestCondition=bestGroup(c,x=>x._weather);
  const bestClarity=bestGroup(c,x=>x._clarity);
  const bestTime=bestGroup(c,x=>x._timeWindow);
  const bestTemp=bestGroup(c,x=>x._tempBucket);
  return `<div class="condition-board">
    <div class="condition-tile"><span>Best Bait</span><strong>${esc(bestColor.label)} ${esc(bestLure.label)}</strong><small>${bestLure.count} fish on your top lure pattern.</small></div>
    <div class="condition-tile"><span>Time of Year</span><strong>${esc(bestSeason.label)}</strong><small>${bestSeason.count} fish when this seasonal pattern was logged.</small></div>

    <div class="condition-tile"><span>Weather</span><strong>${esc(bestCondition.label)}</strong><small>${bestCondition.count} fish under this weather pattern.</small></div>
    <div class="condition-tile"><span>Clarity</span><strong>${esc(bestClarity.label)}</strong><small>${bestClarity.count} fish with this water visibility.</small></div>
    <div class="condition-tile"><span>Time Window</span><strong>${esc(bestTime.label)}</strong><small>${bestTime.count} fish during this part of the day.</small></div>
    <div class="condition-tile"><span>Water Temp</span><strong>${esc(bestTemp.label)}</strong><small>Average fish: ${avgFor(c.filter(x=>x._tempBucket===bestTemp.label))}".</small></div>
  </div>`;
}
function speciesPatternCards(c){
  const species=topEntries(groupCount(c,x=>x.species),6);
  if(!species.length)return '<p class="muted">No species patterns yet.</p>';
  return `<div class="intel-grid">${species.map(([sp,count])=>{

    const b=biggest(subset)||{};
    return `<div class="pattern-card ${speciesClass(sp)}"><span>${esc(sp)}</span><h4>${esc(color.label)} ${esc(lure.label)}</h4><strong>${count}</strong><small>${esc(waterType.label)} • ${esc(time.label)} • ${esc(cond.label)}</small><small>Best fish ${b.length||0}" • Avg ${avgFor(subset)}"</small></div>`;
  }).join('')}</div>`;
}
function conditionNarrative(c){
  if(!c.length)return 'No read yet. Land a fish and the river starts talking.';
  const combo=topCombo(c);
  const bestTime=bestGroup(c,x=>x._timeWindow);
  const bestWater=bestGroup(c,x=>x._waterType);

  }
  return patternText();
}





/* Genesis II 1.2 — River Intelligence Scope + Filters */
let intelState={scope:'currentSeason',water:'All',species:'All',partner:'All',method:'All',waterType:'All'};
function allCatchesEnriched(){return data.catches.map(c=>{const s=sessionFor(c.sessionId);return {...c,_session:s,_water:s.water,_weather:s.weather,_clarity:s.clarity,_flow:s.flow,_seasonPhase:s.spawnPhase||calendarSeasonFromDate(s.date),_waterType:waterTypeForSession(s),_timeWindow:timeWindowForCatch(c),_tempBucket:tempBucket(s.waterTemp),_month:monthLabel(s.date),_season:s.season,_method:s.method,_partners:Array.isArray(s.partners)?s.partners:(s.partners?[s.partners]:[]),_date:s.date}})}
function intelligenceScopeLabel(){
  if(intelState.scope==='all')return 'All Time';
  if(intelState.scope==='currentTrip')return activeSession()?.title||activeSession()?.name||'Current Trip';
  if(intelState.scope==='currentSeason')return data.seasons.find(s=>s.id===data.activeSeason)?.name||'Current Season';
  const season=data.seasons.find(s=>s.id===intelState.scope);return season?season.name:'Current Season';
}
function baseIntelCatches(){
  let c=allCatchesEnriched();
  if(intelState.scope==='currentTrip')c=c.filter(x=>x.sessionId===activeSession()?.id);
  else if(intelState.scope==='currentSeason')c=c.filter(x=>x._season===data.activeSeason);
  else if(intelState.scope==='all'){}
  else c=c.filter(x=>x._season===intelState.scope);
  return c;
}
function filteredIntelCatches(){
  let c=baseIntelCatches();
  if(intelState.water!=='All')c=c.filter(x=>x._water===intelState.water);
  if(intelState.species!=='All')c=c.filter(x=>x.species===intelState.species);
  if(intelState.method!=='All')c=c.filter(x=>x._method===intelState.method);
  if(intelState.waterType!=='All')c=c.filter(x=>x._waterType===intelState.waterType);
  if(intelState.partner!=='All')c=c.filter(x=>x._partners.includes(intelState.partner));
  return c;
}
function uniqSorted(arr){return Array.from(new Set(arr.filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b)))}
function selectOptions(list,current){return ['All',...list].map(v=>`<option value="${esc(v)}" ${v===current?'selected':''}>${esc(v)}</option>`).join('')}
function seasonOptions(){return [`<option value="currentSeason" ${intelState.scope==='currentSeason'?'selected':''}>Current Season</option>`,`<option value="currentTrip" ${intelState.scope==='currentTrip'?'selected':''}>Current Trip</option>`,`<option value="all" ${intelState.scope==='all'?'selected':''}>All Time</option>`,...data.seasons.map(s=>`<option value="${esc(s.id)}" ${intelState.scope===s.id?'selected':''}>${esc(s.name)}</option>`)].join('')}
function setIntelFilter(key,val){intelState[key]=val;renderIntelligence();FishAudio.play('button')}
function resetIntelFilters(){intelState={scope:'currentSeason',water:'All',species:'All',partner:'All',method:'All',waterType:'All'};renderIntelligence();toast('River Intelligence reset')}
function intelligenceFilters(cBase){
  const waters=uniqSorted(cBase.map(x=>x._water)), species=uniqSorted(cBase.map(x=>x.species)), partners=uniqSorted(cBase.flatMap(x=>x._partners)), methods=uniqSorted(cBase.map(x=>x._method)), waterTypes=uniqSorted(cBase.map(x=>x._waterType));
  return `<div class="intel-console">
    <label>Scope<select onchange="setIntelFilter('scope',this.value)">${seasonOptions()}</select></label>

<script>
// Genesis II 1.4 — Trip-Weighted River Intelligence
function minutesFromTime(t){const m=String(t||'').match(/^(\d{1,2}):(\d{2})/);return m?(parseInt(m[1],10)*60+parseInt(m[2],10)):null}

function intelSummary(c){const matched=uniqueSessionsFromCatches(c); const scoped=scopeSessions(); const hours=matched.reduce((a,s)=>a+sessionHours(s),0); const tripCount=matched.length; const scopedTrips=scoped.length; const skunks=Math.max(0,scopedTrips-tripCount); const success=scopedTrips?Math.round((tripCount/scopedTrips)*100):0; const fpt=tripCount?(c.length/tripCount):0; const fph=hours?(c.length/hours):0; return {matched,scoped,hours,tripCount,scopedTrips,skunks,success,fpt,fph,big:biggest(c)||{},avg:avgFor(c)}}

// Genesis III.1 — Living Livewell: water-first mobile experience
function livewellSpeciesKey(species){
  const s=String(species||'').toLowerCase();
  if(s.includes('pike')||s.includes('musk')||s.includes('pickerel'))return 'pike';
  if(s.includes('walleye')||s.includes('sauger'))return 'walleye';
  if(s.includes('trout')||s.includes('salmon'))return 'trout';
  if(s.includes('cat'))return 'catfish';
  if(s.includes('bluegill')||s.includes('crappie')||s.includes('perch')||s.includes('sunfish')||s.includes('rock bass'))return 'panfish';
  if(s.includes('bass')||s.includes('smallmouth')||s.includes('largemouth'))return 'bass';
  return 'bass';
}
function livewellFishColors(species){
  const k=livewellSpeciesKey(species);
  return ({
    bass:['#8bd6a6','#9b784a'],
    walleye:['#ffd36b','#827347'],
    pike:['#b7e7d4','#4f7f68'],
    trout:['#9fd7ff','#8056b3'],
    catfish:['#7f9ab0','#2c526c'],
    panfish:['#ffb06b','#4fb3c8']
  })[k]||['#7de7ff','#0c6c9c'];
}
function livewellSize(c){
  const len=+c.length||12;
  const key=livewellSpeciesKey(c.species);
  const base= key==='pike'?120:key==='catfish'?105:key==='walleye'?98:key==='trout'?92:key==='panfish'?70:88;
  return Math.max(62,Math.min(155,base+(len-14)*3.2));
}
function livewellPosition(i,total,c){
  const golden=(i*137.508)%360;
  const radius=Math.min(38,18+(i%9)*3.4);
  let x=50+Math.cos(golden*Math.PI/180)*radius;
  let y=50+Math.sin(golden*Math.PI/180)*Math.min(30,radius*.72);
  if(total<4){x=[35,62,48,72][i]||x;y=[42,50,62,37][i]||y;}
  if((+c.length||0)>24){x=50+(i%2?9:-7);y=44+(i%3)*7;}
  return [Math.max(10,Math.min(90,x)),Math.max(14,Math.min(86,y))];
}
function livingFishHTML(c,i,total,big){
  const [x,y]=livewellPosition(i,total,c), [c1,c2]=livewellFishColors(c.species);
  const w=livewellSize(c), mw=Math.max(58,Math.min(w,120));
  const dir=i%2?'left':'right';
  const dur=8+(i%7)*1.25;
  const delay=-(i%11)*.7;
  const scale=(c.id===big?.id?1.12:1).toFixed(2);
  const released=String(c.disposition||'').toLowerCase().includes('released')?'released':'';

<script>
/* ============================================================================
   FishSlayR ⇄ Supabase Sync Engine
   ----------------------------------------------------------------------------
   Offline-first. localStorage + IndexedDB stay the source of truth so the app
   works with no connection. This module pushes local changes up and pulls
   remote changes down whenever the device is online.

   Strategy: last-write-wins by `updated_at` (right for a single-user journal
   across multiple devices).

   HOW TO LOAD: include this AFTER the Supabase client is created (see auth
   snippet) and AFTER your main app <script> has defined `data`, `save`,
   `render`, `photoGet`, `photoPut`, `photoDelete`, and `KEY`.

   Because your app is one big non-module <script>, those are all globals on
   window already — this file just reads them.
   ============================================================================ */
(function () {
  'use strict';

  // --- guards ---------------------------------------------------------------
  if (!window.sb) { console.warn('[sync] Supabase client (window.sb) missing'); return; }

  const LAST_PULL_KEY = 'fishslayr.lastPull';
  const PHOTO_BUCKET  = 'catch-photos';
  let   syncing       = false;
  let   pushTimer     = null;

  // ==========================================================================
  // DIRTY TRACKING
  // Call FishSync.touch(record) whenever you create/edit/delete a record,
  // right before save(). It stamps updated_at and marks the record dirty.
  // ==========================================================================
  function nowISO() { return new Date().toISOString(); }

  function touch(rec) {
    if (!rec) return rec;
    rec.updated_at = nowISO();
    rec._dirty = true;
    return rec;
  }

  // Mark the singleton profile (refs/sound/mode/activeSeason) dirty.
  function touchProfile() {
    data._profileDirty = true;
    data._profileUpdatedAt = nowISO();
  }

  // ==========================================================================
  // MAPPERS  (local record  ->  table row)
  // The whole record goes into `data`; a few columns are promoted for queries.
  // ==========================================================================
  function seasonRow(s) {
    return { id: s.id, name: s.name ?? null, archived: !!s.archived,
             deleted: !!s.deleted, updated_at: s.updated_at || nowISO(), data: stripMeta(s) };
  }
  function sessionRow(s) {
    return { id: s.id, season: s.season ?? null, active: !!s.active,
             deleted: !!s.deleted, updated_at: s.updated_at || nowISO(), data: stripMeta(s) };
  }
  function catchRow(c) {
    return { id: c.id, session_id: c.sessionId ?? null, has_photo: !!c.hasPhoto,
             deleted: !!c.deleted, updated_at: c.updated_at || nowISO(), data: stripMeta(c) };
  }
  // Don't persist local-only sync flags into the jsonb payload.
  function stripMeta(rec) {
    const { _dirty, ...rest } = rec;
    return rest;
  }

  // ==========================================================================
  // LOCAL UPSERTS  (table row  ->  local record)  — used on PULL
  // ==========================================================================
  function upsertLocalArray(arrName, incoming, keyField) {
    if (!Array.isArray(data[arrName])) data[arrName] = [];
    const arr = data[arrName];
    const idx = arr.findIndex(x => x[keyField] === incoming[keyField]);
    if (incoming.deleted) {
      if (idx >= 0) arr.splice(idx, 1);          // remote tombstone → drop locally
    } else if (idx >= 0) {
      arr[idx] = incoming;
    } else {
      arr.push(incoming);
    }
  }

  // ==========================================================================
  // PUSH
  // ==========================================================================
  async function pushTable(tableName, arrName, mapFn) {
    const dirty = (data[arrName] || []).filter(r => r._dirty);
    if (!dirty.length) return;
    const rows = dirty.map(mapFn);
    const { error } = await window.sb.from(tableName).upsert(rows);
    if (error) { console.warn(`[sync] push ${tableName} failed`, error); return; } // keep dirty → retry later
    dirty.forEach(r => { delete r._dirty; });                                       // confirmed → clear flag
  }

  async function pushProfile() {
    if (!data._profileDirty) return;
    const row = {
      version: data.version ?? null,
      mode: data.mode ?? null,
      active_season: data.activeSeason ?? null,
      sound: data.sound ?? null,
      refs: data.refs ?? null,
      journal: data.journal ?? null,
      updated_at: data._profileUpdatedAt || nowISO()
    };
    const { error } = await window.sb.from('profiles').upsert(row, { onConflict: 'user_id' });
    if (error) { console.warn('[sync] push profile failed', error); return; }
    delete data._profileDirty;
  }

  // Upload any dirty catch photos from IndexedDB → Supabase Storage.
  async function pushPhotos(userId) {
    const withPhotos = (data.catches || []).filter(c => c.hasPhoto && c._photoDirty);
    for (const c of withPhotos) {
      try {
        const blob = await window.photoGet(c.id);
        if (!blob) { delete c._photoDirty; continue; }
        const path = `${userId}/${c.id}.jpg`;
        const { error } = await window.sb.storage.from(PHOTO_BUCKET)
          .upload(path, blob, { upsert: true, contentType: blob.type || 'image/jpeg' });
        if (error) { console.warn('[sync] photo upload failed', c.id, error); continue; }
        delete c._photoDirty;                    // confirmed
      } catch (e) { console.warn('[sync] photo push error', c.id, e); }
    }
  }

  // ==========================================================================
  // PULL
  // ==========================================================================
  async function pullTable(tableName, arrName, keyField, mapRowToLocal) {
    const since = localStorage.getItem(LAST_PULL_KEY) || '1970-01-01T00:00:00.000Z';
    const { data: rows, error } = await window.sb
      .from(tableName).select('*').gt('updated_at', since);
    if (error) { console.warn(`[sync] pull ${tableName} failed`, error); return; }
    for (const row of (rows || [])) {
      const incoming = mapRowToLocal(row);
      const local = (data[arrName] || []).find(x => x[keyField] === incoming[keyField]);
      // server wins only if strictly newer (last-write-wins)
      if (!local || (incoming.updated_at || '') > (local.updated_at || '')) {
        upsertLocalArray(arrName, incoming, keyField);
      }
    }
  }

  // row.data holds the full original object; re-attach sync columns onto it.
  function rowToLocal(row, extra) {
    return Object.assign({}, row.data, {
      updated_at: row.updated_at,
      deleted: row.deleted
    }, extra || {});
  }

  async function pullProfile() {
    const { data: rows, error } = await window.sb.from('profiles').select('*').limit(1);
    if (error || !rows || !rows.length) return;
    const p = rows[0];
    // Only overwrite if remote profile is newer than our last pull marker.
    const since = localStorage.getItem(LAST_PULL_KEY) || '1970-01-01T00:00:00.000Z';
    if ((p.updated_at || '') <= since) return;
    if (p.refs)          data.refs = p.refs;
    if (p.sound)         data.sound = p.sound;
    if (p.journal)       data.journal = p.journal;
    if (p.active_season) data.activeSeason = p.active_season;
    if (p.mode)          data.mode = p.mode;
  }

  // Pull any photos we're missing locally (has_photo on server, absent in IDB).
  async function pullPhotos(userId) {
    const needing = (data.catches || []).filter(c => c.hasPhoto);
    for (const c of needing) {
      try {
        const existing = await window.photoGet(c.id);
        if (existing) continue;
        const path = `${userId}/${c.id}.jpg`;
        const { data: blob, error } = await window.sb.storage.from(PHOTO_BUCKET).download(path);
        if (error || !blob) continue;
        await window.photoPut(c.id, blob);
      } catch (e) { console.warn('[sync] photo pull error', c.id, e); }
    }
  }

  // ==========================================================================
  // ORCHESTRATION
  // ==========================================================================
  async function syncNow() {
    if (syncing) return;
    if (!navigator.onLine) return;
    const { data: auth } = await window.sb.auth.getUser();
    const user = auth && auth.user;
    if (!user) return;                       // signed out → local-only, no sync

    syncing = true;
    try {
      // PUSH first so our local edits aren't clobbered by an older pull marker.
      await pushProfile();
      await pushTable('seasons',  'seasons',  seasonRow);
      await pushTable('sessions', 'sessions', sessionRow);
      await pushTable('catches',  'catches',  catchRow);
      await pushPhotos(user.id);

      // PULL remote changes since last successful pull.
      await pullProfile();
      await pullTable('seasons',  'seasons',  'id', r => rowToLocal(r));
      await pullTable('sessions', 'sessions', 'id', r => rowToLocal(r));
      await pullTable('catches',  'catches',  'id', r => rowToLocal(r, { sessionId: r.session_id, hasPhoto: r.has_photo }));
      await pullPhotos(user.id);

      localStorage.setItem(LAST_PULL_KEY, nowISO());
      try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) {}
      if (typeof render === 'function') render();
    } catch (e) {
      console.warn('[sync] syncNow error', e);
    } finally {
      syncing = false;
    }
  }

  // Debounced push — call after save() without hammering the network.
  function scheduleSync(ms = 2000) {
    clearTimeout(pushTimer);
    pushTimer = setTimeout(syncNow, ms);
  }

  // ==========================================================================
  // ONE-TIME MIGRATION: seed the server from an existing local device.
  // Runs when the user has local data but has never pulled before.
  // ==========================================================================
  async function migrateIfNeeded() {
    if (localStorage.getItem(LAST_PULL_KEY)) return;       // already synced before
    const { data: auth } = await window.sb.auth.getUser();
    if (!auth || !auth.user) return;
    const stamp = nowISO();
    (data.seasons  || []).forEach(s => { s.updated_at = stamp; s._dirty = true; });
    (data.sessions || []).forEach(s => { s.updated_at = stamp; s._dirty = true; });
    (data.catches  || []).forEach(c => { c.updated_at = stamp; c._dirty = true; if (c.hasPhoto) c._photoDirty = true; });
    touchProfile();
    await syncNow();
  }

  // ==========================================================================
  // WIRE-UP
  // ==========================================================================
  window.addEventListener('online', () => syncNow());
  // periodic safety net while the app is open
  setInterval(() => { if (navigator.onLine) syncNow(); }, 60000);

  // Kick off after auth settles.
  window.sb.auth.onAuthStateChange((_evt, session) => {
    if (session && session.user) {
      migrateIfNeeded().then(syncNow);
    }
  });
  // Also try once on load in case a session is already restored.
  window.addEventListener('load', () => { setTimeout(() => { migrateIfNeeded().then(syncNow); }, 800); });

  // Public surface used by the app's mutation code.
  window.FishSync = { touch, touchProfile, markPhotoDirty(c){ if(c) c._photoDirty = true; },
                      syncNow, scheduleSync };
})();

</script>
